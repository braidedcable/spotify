<!DOCTYPE html>
<!--
  Liked Songs Shuffed — OAuth Callback Page
  ==========================================
  Host this file at the URL you registered as your Spotify Redirect URI.

  Recommended: GitHub Pages
    1. Push this repo to GitHub.
    2. Go to Settings → Pages → deploy from the main branch root.
    3. Your callback URL will be: https://<username>.github.io/<repo>/callback.html
    4. Add that URL as a Redirect URI in your Spotify app settings.
    5. Set REDIRECT_URI in src/bookmarklet.js to match.

  This page:
    • Receives the authorization code from Spotify (PKCE flow)
    • Exchanges it for an access token
    • Sends the token back to the bookmarklet via postMessage
    • Closes itself
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Auth — Liked Songs Shuffed</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #121212;
      font-family: "Circular", system-ui, sans-serif;
      color: #fff;
    }
    .card {
      text-align: center;
      padding: 40px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p  { color: #b3b3b3; margin: 0; font-size: 14px; }
    .error { color: #e91429; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">♻</div>
    <h1>Authorizing…</h1>
    <p>Please wait.</p>
  </div>

  <script>
    (function () {
      var CLIENT_ID    = '54e4d713f18a4e11bf270bcbd0e154ff';
      var REDIRECT_URI = 'https://braidedcable.github.io/spotify/callback.html';

      function show(icon, title, body, isError) {
        document.getElementById('card').innerHTML =
          '<div class="icon">' + icon + '</div>' +
          '<h1' + (isError ? ' class="error"' : '') + '>' + title + '</h1>' +
          '<p>' + body + '</p>';
      }

      function sendToOpener(msg) {
        if (window.opener) {
          window.opener.postMessage(msg, '*');
        }
      }

      var params = new URLSearchParams(window.location.search);
      var code  = params.get('code');
      var state = params.get('state');
      var error = params.get('error');

      if (error || !code) {
        show('✖', 'Authorization failed', error || 'No code received.', true);
        sendToOpener({ type: 'sls_error', error: error || 'No authorization code received.' });
        return;
      }

      if (!state || state.indexOf('.') === -1) {
        show('✖', 'Authorization failed', 'Invalid state parameter.', true);
        sendToOpener({ type: 'sls_error', error: 'Invalid state parameter.' });
        return;
      }

      // state = nonce + '.' + codeVerifier
      var codeVerifier = state.slice(state.indexOf('.') + 1);

      show('♻', 'Authorizing…', 'Exchanging code for token…');

      fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          code:          code,
          redirect_uri:  REDIRECT_URI,
          client_id:     CLIENT_ID,
          code_verifier: codeVerifier,
        }),
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.error) throw new Error(data.error_description || data.error);

        sendToOpener({
          type:      'sls_token',
          token:     data.access_token,
          expiresIn: data.expires_in,
          scope:     data.scope,
        });

        show('✔', 'Authenticated!', 'This window will close automatically…');

        setTimeout(function () {
          window.close();
          setTimeout(function () {
            show('✔', 'Authenticated!', 'You can close this tab and return to the previous page.');
          }, 500);
        }, 800);
      })
      .catch(function (err) {
        show('✖', 'Token exchange failed', err.message, true);
        sendToOpener({ type: 'sls_error', error: err.message });
      });
    })();
  </script>
</body>
</html>
